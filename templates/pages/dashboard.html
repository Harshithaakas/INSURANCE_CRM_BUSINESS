<!DOCTYPE html>
<html>
<head>
<title>Insurance CRM Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
padding:20px;
}

h2{
margin-bottom:20px;
}

/* SUMMARY CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h4{
margin:0;
color:#666;
}

.card h2{
margin-top:10px;
color:#1e3799;
}

/* GRID */

.grid{
display:block;
}

/* CHART BOX */

.chart-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:25px;
width:100%;
}

canvas{
width:100%;
height:400px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f1f2f6;
}

.alert{
background:#ffeaa7;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

</style>
</head>

<body>
<div class="dashboard-topbar">

    <h2 class="dashboard-title">welcome</h2>

    <div class="profile-box">

        <img src="https://ui-avatars.com/api/?name={{ user.name }}&background=0d3b66&color=fff">

        <div class="profile-info">
            <div class="profile-name">{{ user.name }}</div>
            <div class="profile-email">{{ user.email }}</div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h4{
margin:0;
color:#666;
}

.card h2{
margin-top:10px;
color:#1e3799;
}

.grid{
display:block;
}

.chart-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:30px;
width:100%;
}

canvas{
width:100% !important;
height:350px !important;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f1f2f6;
}

.alert{
background:#ffeaa7;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.dashboard-topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.dashboard-title{
font-size:20px;
font-weight:600;
margin:0;
}

.profile-box{
display:flex;
align-items:center;
gap:10px;
}

.profile-box img{
width:35px;
height:35px;
border-radius:50%;
}

.profile-info{
line-height:1.2;
}

.profile-name{
font-size:14px;
font-weight:600;
}

.profile-email{
font-size:12px;
color:gray;
}

</style>



<div class="cards">


    
<div class="card">
<h4>Total Customers</h4>
<h2 id="customers">0</h2>
</div>

<div class="card">
<h4>Total Policies</h4>
<h2 id="policies">0</h2>
</div>

<div class="card">
<h4>Revenue Today</h4>
<h2 id="today">0</h2>
</div>

<div class="card">
<h4>Monthly Revenue</h4>
<h2 id="month">0</h2>
</div>

</div>

<div class="chart-box">
<h3>Insurance Wise Revenue</h3>
<canvas id="insuranceChart"></canvas>
</div>

<div class="chart-box">
<h3>Monthly Revenue</h3>
<canvas id="monthlyChart"></canvas>
</div>

<div class="chart-box">
<h3>Top Agents</h3>

<!-- Month Filter -->
<select id="agentMonth" onchange="filterAgents()" style="margin-bottom:15px; padding:8px; border-radius:6px; border:1px solid #ddd;">
    <option value="all">All Months</option>
    <option value="1">January</option>
    <option value="2">February</option>
    <option value="3">March</option>
    <option value="4">April</option>
    <option value="5">May</option>
    <option value="6">June</option>
    <option value="7">July</option>
    <option value="8">August</option>
    <option value="9">September</option>
    <option value="10">October</option>
    <option value="11">November</option>
    <option value="12">December</option>
</select>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Policies</th>
<th>Revenue</th>
</tr>
</thead>
<tbody id="agentsTable"></tbody>
</table>
</div>

</body>
</html>
