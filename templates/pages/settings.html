<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
}

.container {
    display: flex;
    gap: 20px;
}

/* LEFT MENU */
.sidebar {
    width: 220px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.sidebar h3 {
    margin-bottom: 15px;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin-bottom: 5px;
    border-radius: 6px;
    text-decoration: none;
    color: #333;
    cursor: pointer;
}

.sidebar a:hover {
    background: #3498db;
    color: white;
}

/* RIGHT CONTENT */
.content {
    flex: 1;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
</style>

</head>

<body>

<div class="container">

    <!-- LEFT MENU -->
    <div class="sidebar">
        <h3>⚙ Settings</h3>

        <a onclick="loadSettings('profile')">👤 Profile</a>
        <a onclick="loadSettings('password')">🔒 Change Password</a>
    </div>

    <!-- RIGHT SIDE -->
    <div class="content" id="settingsContent">
        <h3>Welcome to Settings</h3>
        <p>Select an option from left menu</p>
    </div>

</div>


</body>
</html>
